<!doctype html>
<html lang="ca">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>Registre ZOO · AstroMallorca</title>
  <meta name="theme-color" content="#08111f">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Registre ZOO">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icons/icon-192.png">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-shell">
    <header class="hero">
      <div class="brand">ASTROMALLORCA</div>
      <h1>Registre ZOO</h1>
      <p class="subtitle">Recollida de dades per a zones candidates d’observació</p>
    </header>

    <main id="app"></main>
  </div>

  <template id="tpl-home">
    <section class="card stack-lg">
<button class="primary nav big" data-view="new-record">Registrar ZOO</button>
<div class="nav-row">
  <button class="secondary nav" data-view="drafts">Editar ZOO</button>
  <button class="secondary nav" data-view="sent">Enviats</button>
  <button class="ghost nav" id="btn-sync-pending">Pendents</button>
</div>

<button class="ghost" id="btn-help">Ajuda</button>
      <div class="info-banner">
        <strong>Estat:</strong> <span id="home-stats"></span>
      </div>
    </section>
  </template>

  <template id="tpl-list">
    <section class="card stack-md">
      <div class="section-head">
        <button class="icon-btn back-home">←</button>
        <h2 id="list-title"></h2>
      </div>
      <div id="list-container" class="stack-sm"></div>
    </section>
  </template>

  <template id="tpl-editor">
    <section class="card stack-md">
      <div class="section-head">
        <button type="button" class="icon-btn" id="editor-back">←</button>
        <div>
          <h2 id="editor-title">Registrar ZOO</h2>
          <p class="tiny" id="editor-meta"></p>
        </div>
      </div>

<div class="step-tabs five-tabs">
  <button type="button" class="step-tab active" data-step="dades">Dades</button>
  <button type="button" class="step-tab" data-step="visibilitat">Visibilitat</button>
  <button type="button" class="step-tab" data-step="fotos">Fotos</button>
  <button type="button" class="step-tab" data-step="document">Document</button>
  <button type="button" class="step-tab" data-step="final">Guardar / Enviar</button>
</div>

      <section class="step-panel active" data-panel="dades">
        <div class="field-grid">
          <label>
            <span>Nom del lloc</span>
            <input type="text" id="placeName" placeholder="Ex.: Mirador des Cap">
          </label>
          <label>
            <span>Municipi</span>
            <input type="text" id="municipality" placeholder="Ex.: Pollença">
          </label>
          <label class="full-width">
            <span>Direcció</span>
            <input type="text" id="address" placeholder="Carr., camí o referència exacta">
          </label>
          <label>
            <span>Persona que registre</span>
            <input type="text" id="registrar" placeholder="Nom i llinatges">
          </label>
        </div>

        <div class="subcard stack-sm">
          <div class="section-head compact wrap-mobile">
            <h3>Ubicació i moment</h3>
            <button type="button" class="ghost small" id="btn-capture-location">Captura ubicació</button>
          </div>
          <div class="field-grid">
            <label>
              <span>Data</span>
              <select id="obsDate">
                <option value="2026-04-29">29/4</option>
                <option value="2026-04-30">30/4</option>
              </select>
            </label>
            <label>
              <span>Hora objectiu</span>
              <input type="text" id="targetTime" readonly placeholder="Automàtica segons la ubicació">
            </label>
            <label>
              <span>Latitud</span>
              <input type="number" id="latitude" step="any" placeholder="Automàtica o manual">
            </label>
            <label>
              <span>Longitud</span>
              <input type="number" id="longitude" step="any" placeholder="Automàtica o manual">
            </label>
          </div>
          <div class="countdown-box">
            <div class="tiny">Compte enrera automàtic</div>
            <div id="countdown">—</div>
          </div>
        </div>
      </section>

      <section class="step-panel" data-panel="visibilitat">
        <div class="countdown-box slim-box">
          <div class="tiny">Compte enrera</div>
          <div id="countdown-visibility">—</div>
        </div>

        <div class="subcard stack-sm">
          <h3>Visibilitat</h3>
          <div class="choice-group" data-field="visibility">
            <button type="button" class="choice" data-value="sí">Sí</button>
            <button type="button" class="choice" data-value="no">No</button>
            <button type="button" class="choice" data-value="parcialment">Parcialment</button>
            <button type="button" class="choice" data-value="no s'ha pogut comprovar">No s'ha pogut comprovar</button>
          </div>
        </div>

        <div class="subcard stack-sm">
          <h3>Quantitat de zona visible</h3>
          <div class="choice-group" data-field="visibleArea">
            <button type="button" class="choice" data-value="molt poca">Molt poca</button>
            <button type="button" class="choice" data-value="poca">Poca</button>
            <button type="button" class="choice" data-value="mitjana">Mitjana</button>
            <button type="button" class="choice" data-value="alta">Alta</button>
            <button type="button" class="choice" data-value="total">Total</button>
          </div>
        </div>

        <div class="row-2 stack-sm-mobile">
          <div class="subcard stack-sm">
            <h3>Aparcament</h3>
            <div class="choice-group" data-field="parking">
              <button type="button" class="choice" data-value="sí">Sí</button>
              <button type="button" class="choice" data-value="no">No</button>
              <button type="button" class="choice" data-value="limitat">Limitat</button>
              <button type="button" class="choice" data-value="no comprovat">No comprovat</button>
            </div>
          </div>
          <div class="subcard stack-sm">
            <h3>Accessos</h3>
            <div class="choice-group" data-field="access">
              <button type="button" class="choice" data-value="sí">Sí</button>
              <button type="button" class="choice" data-value="no">No</button>
              <button type="button" class="choice" data-value="limitat">Limitat</button>
              <button type="button" class="choice" data-value="no comprovat">No comprovat</button>
            </div>
          </div>
        </div>

        <label>
          <span>Comentaris</span>
          <textarea id="notes" rows="4" placeholder="Comentaris, incidències o aclariments"></textarea>
        </label>
      </section>

<section class="step-panel" data-panel="fotos">
  <div class="subcard stack-sm">
    <div class="section-head compact wrap-mobile">
      <h3>Fotografies del lloc</h3>
      <label class="primary file-btn">
        Fer / Afegir foto
        <input type="file" id="photoInput" accept="image/*" capture="environment" multiple hidden>
      </label>
    </div>
    <div id="photoList" class="photo-grid empty">Encara no hi ha fotos.</div>
  </div>
</section>

      <section class="step-panel" data-panel="document">
        <div class="subcard stack-sm">
          <div class="section-head compact wrap-mobile">
            <h3>Document adjunt</h3>
            <label class="primary file-btn">
              Adjuntar document
              <input type="file" id="documentInput" accept=".pdf,image/*" multiple hidden>
            </label>
          </div>
          <div id="documentBox" class="media-list empty">No hi ha cap document adjunt.</div>
        </div>
      </section>

      <section class="step-panel" data-panel="final">
        <div id="summaryBox" class="stack-sm"></div>
<div class="footer-actions">
  <button type="button" class="primary" id="send-record">Enviar</button>
</div>
      </section>
    </section>
  </template>

<div id="imageModal" class="image-modal hidden">
  <div class="image-modal-backdrop" id="imageModalBackdrop"></div>
  <div class="image-modal-content">
    <button type="button" class="image-modal-close" id="imageModalClose">×</button>
    <img id="imageModalImg" alt="Vista de la foto">
  </div>
</div>

<script src="horizon_engine.js"></script>
<script src="app.js"></script>
</body>
</html>
